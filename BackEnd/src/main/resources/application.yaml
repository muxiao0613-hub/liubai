server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/liubai?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

jwt:
  # 生产环境务必通过环境变量 JWT_SECRET 覆盖；至少 32 字节。
  secret: ${JWT_SECRET:change-me-in-production-this-is-a-dev-only-256-bit-secret-key-0123456789}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  cors:
    # 逗号分隔的允许来源；通过环境变量 APP_CORS_ALLOWED_ORIGINS 覆盖
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
  admin:
    # 首次启动自动创建的管理员账号
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}

logging:
  level:
    org.springframework.security: ${SECURITY_LOG_LEVEL:INFO}
