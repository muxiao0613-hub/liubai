<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="s">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
    <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7b820"/>
      <stop offset="100%" stop-color="#da8e00"/>
    </linearGradient>
    <linearGradient id="pg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf7ee"/>
      <stop offset="100%" stop-color="#ede3d0"/>
    </linearGradient>
    <filter id="ps" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#9a6400" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- 羊皮纸底色 -->
  <rect width="512" height="512" rx="112" fill="url(#pg)"/>

  <!-- 左半琥珀色 -->
  <rect width="258" height="512" fill="url(#ag)" clip-path="url(#s)"/>

  <!-- 分割线高光 -->
  <line x1="258" y1="0" x2="258" y2="512" stroke="#fff" stroke-width="2" opacity="0.18" clip-path="url(#s)"/>

  <!-- 左侧小圆点（走过的城市足迹） -->
  <circle cx="80"  cy="210" r="11" fill="#fff" opacity="0.22" clip-path="url(#s)"/>
  <circle cx="145" cy="155" r="7"  fill="#fff" opacity="0.18" clip-path="url(#s)"/>
  <circle cx="190" cy="310" r="9"  fill="#fff" opacity="0.20" clip-path="url(#s)"/>
  <circle cx="60"  cy="345" r="6"  fill="#fff" opacity="0.15" clip-path="url(#s)"/>
  <circle cx="210" cy="210" r="5"  fill="#fff" opacity="0.14" clip-path="url(#s)"/>

  <!-- 定位针（留在留白处） -->
  <g filter="url(#ps)" clip-path="url(#s)">
    <path d="M374,334 C344,286 312,244 312,188 A62,62 0 1 1 436,188 C436,244 404,286 374,334 Z" fill="#f0a500"/>
    <circle cx="374" cy="184" r="25" fill="#fdf7ee" opacity="0.92"/>
    <ellipse cx="374" cy="334" rx="6" ry="4" fill="#fff" opacity="0.25"/>
  </g>

  <!-- 顶部高光 -->
  <path d="M0,0 Q129,60 258,0 L258,0 L0,0 Z" fill="#fff" opacity="0.10" clip-path="url(#s)"/>
</svg>
